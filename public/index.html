<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lumina LMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main id="auth-screen" class="auth-shell">
      <section class="auth-hero">
        <div class="brand-mark">L</div>
        <p class="eyebrow">Lumina LMS</p>
        <h1>Apprendre, évaluer, certifier.</h1>
        <p>
          Une plateforme pédagogique inspirée des meilleurs LMS: modules clairs, leçons PDF ou vidéo,
          évaluations immédiates et certificats de validation.
        </p>
        <div class="demo-grid">
          <button data-demo="promoter@lumina.test">Promoteur demo</button>
          <button data-demo="teacher@lumina.test">Enseignant demo</button>
          <button data-demo="student@lumina.test">Etudiant demo</button>
        </div>
      </section>
      <section class="auth-panel">
        <div class="tabs">
          <button class="tab active" data-auth-tab="login">Connexion</button>
          <button class="tab" data-auth-tab="register">Inscription</button>
        </div>
        <form id="login-form" class="form-stack">
          <label>Email<input name="email" type="email" value="student@lumina.test" required /></label>
          <label>Mot de passe<input name="password" type="password" value="password123" required /></label>
          <button class="primary" type="submit">Entrer dans le campus</button>
        </form>
        <form id="register-form" class="form-stack hidden">
          <label>Nom complet<input name="name" required /></label>
          <label>Email<input name="email" type="email" required /></label>
          <label>Mot de passe<input name="password" type="password" minlength="6" required /></label>
          <label>Rôle
            <select name="role">
              <option value="student">Etudiant</option>
              <option value="teacher">Enseignant</option>
              <option value="promoter">Promoteur</option>
            </select>
          </label>
          <button class="primary" type="submit">Créer mon compte</button>
        </form>
        <p id="auth-message" class="message"></p>
      </section>
    </main>

    <main id="app-screen" class="app-shell hidden">
      <aside class="sidebar">
        <div class="brand-row">
          <div class="brand-mark">L</div>
          <div>
            <strong>Lumina</strong>
            <span>Learning OS</span>
          </div>
        </div>
        <nav>
          <button class="nav active" data-view="overview">Aperçu</button>
          <button class="nav" data-view="modules">Modules</button>
          <button class="nav" data-view="courses">Cours</button>
          <button class="nav" data-view="studio">Studio</button>
          <button class="nav" data-view="progress">Progression</button>
          <button class="nav" data-view="certificates">Certificats</button>
        </nav>
        <button id="logout" class="ghost">Déconnexion</button>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <p id="role-label" class="eyebrow"></p>
            <h2 id="page-title">Aperçu</h2>
          </div>
          <div class="profile-chip">
            <span id="user-initials">--</span>
            <div>
              <strong id="user-name"></strong>
              <small id="user-email"></small>
            </div>
          </div>
        </header>
        <section id="view-root"></section>
      </section>
    </main>

    <template id="question-template">
      <fieldset class="question-box">
        <label>Question<textarea name="question" required></textarea></label>
        <div class="option-grid">
          <label>A<input name="option_a" required /></label>
          <label>B<input name="option_b" required /></label>
          <label>C<input name="option_c" required /></label>
          <label>D<input name="option_d" required /></label>
        </div>
        <label>Bonne réponse
          <select name="correct_option">
            <option>A</option>
            <option>B</option>
            <option>C</option>
            <option>D</option>
          </select>
        </label>
      </fieldset>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
