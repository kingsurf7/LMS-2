<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Vision - Plateforme LMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <!-- Écran d'authentification -->
  <div id="auth-screen" class="auth-shell">
    <div class="auth-hero">
      <div class="brand-mark">BV</div>
      <p class="eyebrow">Brain Vision</p>
      <h1>Apprenez l'IA,<br>Certifiez vos compétences.</h1>
      <p>Plateforme LMS nouvelle génération dédiée à l'intelligence artificielle, au machine learning et aux technologies émergentes.</p>
      <div class="demo-grid">
        <button data-demo="promoter@brain-vision.com">👑 Promoteur</button>
        <button data-demo="teacher@brain-vision.com">👨‍🏫 Enseignant</button>
        <button data-demo="student@brain-vision.com">👨‍🎓 Étudiant</button>
      </div>
    </div>
    <div class="auth-panel">
      <div class="tabs">
        <button class="tab active" data-auth-tab="login">Connexion</button>
        <button class="tab" data-auth-tab="register">Inscription</button>
      </div>
      <form id="login-form" class="form-stack">
        <label>Email
          <input name="email" type="email" placeholder="email@exemple.com" required>
        </label>
        <label>Mot de passe
          <input name="password" type="password" placeholder="••••••••" required>
        </label>
        <button class="primary" type="submit">Se connecter</button>
      </form>
      <form id="register-form" class="form-stack hidden">
        <label>Nom complet
          <input name="name" placeholder="Jean Dupont" required>
        </label>
        <label>Email
          <input name="email" type="email" placeholder="email@exemple.com" required>
        </label>
        <label>Mot de passe
          <input name="password" type="password" placeholder="6 caractères minimum" minlength="6" required>
        </label>
        <label>Rôle
          <select name="role">
            <option value="student">👨‍🎓 Étudiant</option>
            <option value="teacher">👨‍🏫 Enseignant</option>
            <option value="promoter">👑 Promoteur</option>
          </select>
        </label>
        <button class="primary" type="submit">Créer mon compte</button>
      </form>
      <p id="auth-message" class="message"></p>
    </div>
  </div>

  <!-- Application principale -->
  <div id="app-screen" class="app-shell hidden">
    <aside class="sidebar">
      <div class="brand-row">
        <div class="brand-mark">BV</div>
        <div>
          <strong>Brain Vision</strong>
          <span>Learning OS</span>
        </div>
      </div>
      <nav>
        <button class="nav" data-view="overview">📊 Aperçu</button>
        <button class="nav" data-view="modules">📚 Modules</button>
        <button class="nav" data-view="courses">🎓 Cours</button>
        <button class="nav" data-view="studio">✏️ Studio</button>
        <button class="nav" data-view="progress">📈 Progression</button>
        <button class="nav" data-view="certificates">🏆 Certificats</button>
      </nav>
      <button id="logout" class="ghost">🚪 Déconnexion</button>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <p id="role-label" class="eyebrow"></p>
          <h2 id="page-title">Tableau de bord</h2>
        </div>
        <div class="profile-chip">
          <span id="user-initials"></span>
          <div>
            <strong id="user-name"></strong>
            <small id="user-email"></small>
          </div>
        </div>
      </header>
      <div id="view-root"></div>
    </main>
  </div>

  <!-- Templates -->
  <template id="question-template">
    <fieldset class="question-box">
      <label>Question <textarea name="question" placeholder="Votre question..." required></textarea></label>
      <div class="option-grid">
        <label>A <input name="option_a" placeholder="Option A" required></label>
        <label>B <input name="option_b" placeholder="Option B" required></label>
        <label>C <input name="option_c" placeholder="Option C" required></label>
        <label>D <input name="option_d" placeholder="Option D" required></label>
      </div>
      <label>Bonne réponse
        <select name="correct_option">
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
          <option value="D">D</option>
        </select>
      </label>
    </fieldset>
  </template>

  <script src="/app.js"></script>
</body>
</html>
